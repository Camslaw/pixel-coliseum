<div class="ui-card hub-root">
  <img class="logo" src="/assets/pc-logo.png" alt="Pixel Coliseum" />

  <div class="top-row">
    <div id="signedInAs" class="signed-in-as"></div>
    <button id="profile" class="secondary-btn" type="button">Profile</button>
  </div>

  <div class="subtitle">Host or Join a room</div>

  <div class="field">
    <div class="field-label">Room ID</div>
    <input id="roomId" type="text" />
  </div>

  <div class="actions">
    <button id="host">Host</button>
    <button id="join">Join</button>
    <button id="logout">Logout</button>
  </div>

  <div id="status"></div>
</div>
