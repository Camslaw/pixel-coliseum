<div class="ui-card profile-root">
  <div id="profileName" class="profile-title">Profile</div>
  <div id="profileStatus" class="profile-status"></div>

  <div class="stats-grid">
    <div class="stat-card">
      <div class="stat-label">Highest Score</div>
      <div id="highestScore" class="stat-value">0</div>
    </div>

    <div class="stat-card">
      <div class="stat-label">Highest Round Survived</div>
      <div id="highestRound" class="stat-value">0</div>
    </div>

    <div class="stat-card">
      <div class="stat-label">Total Score</div>
      <div id="totalScore" class="stat-value">0</div>
    </div>

    <div class="stat-card">
      <div class="stat-label">Total Kills</div>
      <div id="totalKills" class="stat-value">0</div>
    </div>

    <div class="stat-card">
      <div class="stat-label">Power-Ups Collected</div>
      <div id="totalPowerUps" class="stat-value">0</div>
    </div>

    <div class="stat-card">
      <div class="stat-label">Total Time Played</div>
      <div id="totalTimePlayed" class="stat-value">0s</div>
    </div>

    <div class="stat-card">
      <div class="stat-label">Games Played</div>
      <div id="gamesPlayed" class="stat-value">0</div>
    </div>
  </div>

  <div class="actions">
    <button id="backToHub">Back</button>
  </div>
</div>
